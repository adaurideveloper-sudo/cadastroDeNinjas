
# ConfiguraÓÐo da URL (mantenha a mesma do seu log)
spring.application.name=CadastroDeNinjas
spring.datasource.url=${DATABASE_URL}
spring.datasource.driverClassName=org.h2.Driver
# Suas novas credenciais
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
# Habilitar o console e garantir que o banco nÐo feche
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Set this to 'validate' or 'none' when using Flyway


#configurar o flyway
spring.flyway. enable=true
spring.flyway.locations=classpath:db/migrations
spring.flyway.baseline-on-migrate=true

